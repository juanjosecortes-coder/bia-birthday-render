<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cumpleaños Template – Púrpura</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0d0d1a;
      font-family: 'Arial', sans-serif;
    }

    .card {
      position: relative;
      width: 420px;
      display: inline-block;
    }

    .card .bg-image {
      width: 100%;
      display: block;
    }

    /* ─── SECCIÓN 1: Foto de la persona ─────────────────────────────── */
    .photo-slot {
    position: absolute;
    top: 20%;
    left: 51%;
    transform: translateX(-50%);
    width: 179px;
    aspect-ratio: 1 / 1;
    border-radius: 53%;
    overflow: hidden;
    }

    .photo-slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    /* ─── SECCIÓN 2: Nombre de la persona ───────────────────────────── */
    .name-slot {
    position: absolute;
    bottom: 85px;
    left: 53%;
    transform: translateX(-50%);
    width: 40%;
    text-align: center;
    color: #dcdcdc;
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(11px, 3.8vw, 16px);
    font-weight: 800;
    letter-spacing: 0.04em;
    line-height: 1.3;
    white-space: normal;
    word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="card">

    <img class="bg-image" src="_Cumpleaños.png" alt="Cumpleaños">

    <!-- ▼ SECCIÓN 1: URL de la foto del cumpleañero -->
    <div class="photo-slot">
      <img src="Juan Jose.png" alt="{{ nombre }}">
    </div>

    <!-- ▼ SECCIÓN 2: Nombre del cumpleañero -->
    <div class="name-slot">Juan Jose Cortes</div>

  </div>
</body>
</html>
